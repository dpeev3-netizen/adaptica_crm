version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Uncomment to run app locally in docker-compose
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DATABASE_URL=postgresql://postgres:password@db:5432/crm_db
  #     - NEXTAUTH_URL=http://localhost:3000
  #     - NEXTAUTH_SECRET=changeme
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     - db
  #     - redis

volumes:
  postgres_data:
  redis_data:
